name: Build Tailwind CSS

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'src/input.css'
      - 'tailwind.config.js'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Commit built CSS if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet styles.css; then
            echo "No CSS changes — skipping commit."
          else
            git add styles.css
            git commit -m "chore: rebuild Tailwind CSS [skip ci]"
            git push
          fi
